<div class="header-officina">
    <div class="header-logo" onclick="attivaMenu('btn-home'); tornaAllHub()">
        ⚙️ Officina AT
    </div>
    
    <nav class="header-nav">
        <button id="btn-home" class="header-btn" onclick="attivaMenu('btn-home'); tornaAllHub()">Home</button>
        <button id="btn-area-test" class="header-btn" onclick="attivaMenu('btn-area-test'); caricaPagina('pagine/area-test.html')">Area Test</button>
        <button id="btn-professione" class="header-btn" onclick="attivaMenu('btn-professione'); caricaPagina('pagine/come-diventare-at.html')">Professione</button>
        <button id="btn-appunti" class="header-btn" onclick="attivaMenu('btn-appunti'); vaiAgliAppunti()">Appunti</button>
    </nav>
</div>

<img src="x" style="display:none;" onerror="
    window.attivaMenu = function(id) {
        document.querySelectorAll('.header-btn').forEach(function(b) { b.classList.remove('selezionato'); });
        var btn = document.getElementById(id);
        if(btn) btn.classList.add('selezionato');
    };

    window.sincronizzaMenu = function() {
        var pagina = sessionStorage.getItem('paginaSalvata') || '';
        var hub = document.getElementById('home-hub');
        
        if (!pagina || (hub && hub.style.display !== 'none')) {
            attivaMenu('btn-home');
        } 
        else if (pagina.includes('area-test') || pagina.includes('quiz')) { 
            attivaMenu('btn-area-test'); 
        }
        else if (pagina.includes('come-diventare') || pagina.includes('cosa-fa') || pagina.includes('carriera') || pagina.includes('link-utili')) { 
            attivaMenu('btn-professione'); 
        }
    };

    setTimeout(sincronizzaMenu, 100);

    if (!window.menuSincronizzato) {
        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('header-btn')) {
                setTimeout(sincronizzaMenu, 150);
            }
        });
        window.menuSincronizzato = true;
    }
">
